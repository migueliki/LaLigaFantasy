version: '3.8'

services:
  web:
    image: webdevops/php-apache:8.2
    container_name: fantasy_web
    depends_on:
      - mysql
    ports:
      - "8090:80"
    environment:
      - WEB_DOCUMENT_ROOT=/app/app
      - WEB_DOCUMENT_INDEX=index.php
      - PHP_DISPLAY_ERRORS=1
    volumes:
      - c:/xampp/htdocs/LaLigaFantasy:/app

  mysql:
    image: mysql:8.0
    container_name: fantasy_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=fantasyASIR25
      - MYSQL_DATABASE=fantasy
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=fantasyASIR25
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - c:/xampp/htdocs/LaLigaFantasy/database/fantasy.sql:/docker-entrypoint-initdb.d/01_fantasy.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin:5
    container_name: fantasy_pma
    environment:
      - PMA_HOST=fantasy_mysql
      - PMA_PORT=3306
      - PMA_USER=admin
      - PMA_PASSWORD=FantasyASIR25
      - UPLOAD_LIMIT=128M
    ports:
      - "8091:80"
    depends_on:
      - mysql

volumes:
  db_data:
